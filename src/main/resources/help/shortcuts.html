<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>快捷键</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; line-height: 1.6; }
        h1 { color: #b3446c; }
        kbd { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; font-family: monospace; border: 1px solid #ccc; }
        table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #fce4ec; }
    </style>
</head>
<body>
<h1>⌨️ 快捷键</h1>
<table>
    <tr><th>快捷键</th><th>功能</th></tr>
    <tr><td><kbd>Ctrl+Z</kbd></td><td>撤销</td></tr>
    <tr><td><kbd>Ctrl+Y</kbd></td><td>重做</td></tr>
    <tr><td><kbd>Ctrl+S</kbd></td><td>保存项目</td></tr>
    <tr><td><kbd>Ctrl+O</kbd></td><td>打开项目</td></tr>
    <tr><td><kbd>Ctrl+N</kbd></td><td>新建项目</td></tr>
</table>
<p>更多快捷键将在后续版本中添加。</p>
</body>
</html>
